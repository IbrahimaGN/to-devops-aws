name: CI/CD Front

on:
  push:
    branches: [main]
    paths:
      - 'app/front/**'
      - '.github/workflows/ci-front.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image Front
        uses: docker/build-push-action@v5
        with:
          context: ./app/front
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-front:${{ github.sha }}

      - name: Copier le script de déploiement sur le Front
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "scripts/deploy-front.sh"
          target: "/tmp/"
          strip_components: 1

      - name: Déployer le conteneur Front (avec rollback automatique)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /tmp/deploy-front.sh
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/todo-front" \
            TAG="${{ github.sha }}" \
            BACKEND_HOST="${{ secrets.BACK_HOST }}" \
            /tmp/deploy-front.sh
      - name: Notifier par email (deploiement Front reussi)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ Deploiement Front reussi - Todo MediShop"
          to: gningkhalilo49@gmail.com
          from: GitHub Actions CI/CD
          body: |
            Le deploiement du Front a reussi.

            Commit : ${{ github.sha }}
            Branche : ${{ github.ref_name }}
            Auteur : ${{ github.actor }}
            Voir le run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}