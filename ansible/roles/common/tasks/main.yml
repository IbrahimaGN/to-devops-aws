---
- name: Mettre à jour le cache apt
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installer les dépendances système nécessaires
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Créer le répertoire pour la clé GPG Docker
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Ajouter la clé GPG officielle Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  register: docker_gpg_key

- name: Ajouter le dépôt APT Docker
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker Engine, CLI et le plugin Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: S'assurer que le service Docker est démarré et actif
  systemd:
    name: docker
    state: started
    enabled: true

- name: Ajouter l'utilisateur ubuntu au groupe docker (pour exécuter docker sans sudo)
  user:
    name: ubuntu
    groups: docker
    append: true

- name: Vérifier la version de Docker installée
  command: docker --version
  register: docker_version_output
  changed_when: false

- name: Afficher la version de Docker
  debug:
    msg: "{{ docker_version_output.stdout }}"