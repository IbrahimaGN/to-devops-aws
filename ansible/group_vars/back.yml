---
# Back est en subnet privé : on rebondit via Front (bastion) pour la connexion SSH.
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
  -o ProxyCommand="ssh -W %h:%p -q -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@{{ bastion_host }} -i {{ ansible_ssh_private_key_file }}"