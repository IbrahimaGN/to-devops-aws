<main>
  <h1>Todo MediShop</h1>

  <div class="add-form">
    <input
      type="text"
      placeholder="Nouvelle tache..."
      [(ngModel)]="newTitle"
      (keyup.enter)="add()"
    />
    <button (click)="add()">Ajouter</button>
  </div>

  <ul class="todo-list">
    @for (todo of todos(); track todo.id) {
      <li [class.done]="todo.done">
        <input type="checkbox" [checked]="todo.done" (change)="toggle(todo)" />
        <span>{{ todo.title }}</span>
        <button class="delete" (click)="remove(todo)">Supprimer</button>
      </li>
    } @empty {
      <li class="empty">Aucune tache pour le moment.</li>
    }
  </ul>
</main>
